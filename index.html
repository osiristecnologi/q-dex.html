<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q-DEX</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial;
}
</style>
</head>

<body class="p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">Q-DEX</h1>

  <!-- Language Switch -->
  <select onchange="setLang(this.value)" class="bg-black border px-3 py-1 rounded">
    <option value="pt">🇧🇷 PT</option>
    <option value="en">🇺🇸 EN</option>
    <option value="cn">🇨🇳 中文</option>
  </select>
</div>

<!-- WALLET -->
<div class="bg-zinc-900 p-4 rounded-xl mb-4">
  <h2 id="walletTitle"></h2>
  <p id="addressLabel"></p>
</div>

<!-- SWAP -->
<div class="bg-zinc-900 p-4 rounded-xl mb-4">
  <p id="payLabel"></p>
  <input class="text-black w-full mb-3" value="1000">

  <p id="receiveLabel"></p>
  <input class="text-black w-full mb-3" value="498">

  <button onclick="swap()" id="swapBtn"
    class="bg-blue-500 w-full py-3 rounded">
  </button>
</div>

<!-- STATUS -->
<div class="bg-zinc-900 p-4 rounded-xl">
  <h3 id="statusTitle"></h3>
  <p id="statusText"></p>
</div>

<script>

// 🌍 TRADUÇÕES
const translations = {
  pt: {
    wallet: "Sua Carteira",
    address: "Endereço",
    pay: "Você paga",
    receive: "Você recebe",
    swap: "EXECUTAR SWAP",
    status: "Status",
    statusText: "Protegido contra ataques quânticos",
    alertConnect: "Carteira conectada!",
    alertSwap: "Swap realizado com sucesso!"
  },

  en: {
    wallet: "Your Wallet",
    address: "Address",
    pay: "You Pay",
    receive: "You Receive",
    swap: "EXECUTE SWAP",
    status: "Status",
    statusText: "Protected against quantum attacks",
    alertConnect: "Wallet connected!",
    alertSwap: "Swap successful!"
  },

  cn: {
    wallet: "您的钱包",
    address: "地址",
    pay: "支付",
    receive: "接收",
    swap: "执行交换",
    status: "状态",
    statusText: "防量子攻击保护",
    alertConnect: "钱包已连接！",
    alertSwap: "交换成功！"
  }
};

// idioma padrão
let currentLang = "pt";

// aplicar idioma
function applyLang(){
  const t = translations[currentLang];

  document.getElementById("walletTitle").innerText = t.wallet;
  document.getElementById("addressLabel").innerText = t.address + ": 0x7fA9...";

  document.getElementById("payLabel").innerText = t.pay;
  document.getElementById("receiveLabel").innerText = t.receive;

  document.getElementById("swapBtn").innerText = t.swap;

  document.getElementById("statusTitle").innerText = t.status;
  document.getElementById("statusText").innerText = t.statusText;
}

// trocar idioma
function setLang(lang){
  currentLang = lang;
  applyLang();
}

// ações
function swap(){
  alert(translations[currentLang].alertSwap);
}

// inicializar
applyLang();

</script>

</body>
</html>
